<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactFlow Studio | Dashboard</title>
    <meta name="tiktok-verification" content="tiktok-developers-site-verification=KctXJW0TOXKjmWN6x7EQzW6S8qtiVFnh">
    <meta name="google-site-verification" content="x721azbBy6zgvunsH9nVsLwUzGqL3HzpB9UU_USRzpI">
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; color: #1c1e21; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; }
        h1 { color: #fe2c55; margin-bottom: 10px; font-size: 28px; }
        .btn-tiktok { background-color: #000; color: white; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin: 20px 0; font-size: 16px; transition: 0.3s; }
        .btn-tiktok:hover { opacity: 0.8; }
        .upload-zone { border: 2px dashed #cbd5e0; padding: 40px; border-radius: 12px; margin-top: 20px; cursor: pointer; transition: 0.3s; background: #fafafa; }
        .upload-zone:hover { border-color: #fe2c55; background: #fff5f7; }
        #postBtn { margin-top:20px; padding: 14px 28px; background: #fe2c55; color:white; border:none; border-radius:8px; cursor:pointer; display:none; width: 100%; font-weight: bold; font-size: 16px; }
        .footer-links { margin-top: 40px; font-size: 13px; }
        a { color: #4b5563; text-decoration: none; margin: 0 12px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>FactFlow Studio</h1>
    <p style="color: #65676b;">Educational Content Creator Tool</p>

    <button class="btn-tiktok" onclick="alert('Redirecting to TikTok OAuth 2.0...')">
        Log in with TikTok
    </button>

    <div style="margin: 20px 0; color: #bcc0c4;">OR</div>

    <div class="upload-zone" onclick="document.getElementById('videoFile').click()">
        <strong id="uploadStatus">Click to select video</strong>
        <p id="fileName" style="font-size: 12px; color: #fe2c55; margin-top: 8px;"></p>
        <input type="file" id="videoFile" style="display:none" accept="video/*">
    </div>

    <button id="postBtn" onclick="simulateUpload()">
        Post to TikTok Profile
    </button>
</div>

<div class="footer-links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
</div>

<script>
    const fileInput = document.getElementById('videoFile');
    const uploadStatus = document.getElementById('uploadStatus');
    const fileNameDisplay = document.getElementById('fileName');
    const postBtn = document.getElementById('postBtn');

    fileInput.addEventListener('change', function() {
        // Am corectat aici sa citeasca corect numele fisierului
        if (this.files && this.files) {
            const name = this.files.name;
            uploadStatus.innerText = "Video Ready!";
            fileNameDisplay.innerText = "Selected: " + name;
            postBtn.style.display = 'block';
        }
    });

    function simulateUpload() {
        postBtn.disabled = true;
        let progress = 0;
        postBtn.style.background = "#666";
        
        let interval = setInterval(() => {
            progress += 10;
            postBtn.innerText = "Uploading to TikTok... " + progress + "%";
            if(progress >= 100) {
                clearInterval(interval);
                postBtn.style.background = "#4CAF50";
                postBtn.innerText = "Successfully Published!";
                alert("Success: Video has been published to TikTok via Content Posting API.");
            }
        }, 400);
    }
</script>

</body>
</html>
